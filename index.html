<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求管理 | パル設計</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Material Symbols (線画アイコン) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Stylesheet -->
  <link rel="stylesheet" href="index.css">
  <!-- Supabase JS (予算管理連携用) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- App Icon -->
  <link rel="icon" href="pal-logo.png" type="image/png">
</head>
<body>

<div class="app-layout">
  <!-- 左サイドナビゲーション (Google Workspace ドロワー風) -->
  <aside class="app-sidebar">
    <div class="sidebar-brand">
      <span class="material-symbols-outlined brand-icon">receipt_long</span>
      <span class="brand-text">請求管理</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="input">
        <span class="material-symbols-outlined nav-icon">edit_document</span>
        <span class="nav-text">請求入力</span>
      </button>
      <button class="nav-item" data-tab="list">
        <span class="material-symbols-outlined nav-icon">table_view</span>
        <span class="nav-text">請求一覧</span>
      </button>
      <button class="nav-item" data-tab="notice">
        <span class="material-symbols-outlined nav-icon">payments</span>
        <span class="nav-text">支払通知発行</span>
      </button>
      <button class="nav-item" data-tab="settings">
        <span class="material-symbols-outlined nav-icon">settings</span>
        <span class="nav-text">設定</span>
      </button>
    </nav>
  </aside>

  <!-- 右メインコンテンツエリア -->
  <div class="app-container">
    <!-- メインヘッダー (接続ステータスなどのミニマルヘッダー) -->
    <header class="main-header">
      <div class="header-status">
        <div id="data-status" class="data-status syncing">
          <span class="status-dot"></span>
          <span class="status-text">接続中...</span>
        </div>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">

      <!-- === 請求入力セクション === -->
      <section id="tab-input" class="tab-content active">
        <div class="card">
          <h2 class="section-title">請求入力</h2>
          <form id="invoice-form">
            <div class="form-grid">
              <!-- 注文書連携（一番上） -->
              <div class="form-group full-width" style="margin-bottom: -4px;">
                <label class="form-label" style="display: flex; align-items: center; gap: 12px; color: var(--google-primary); font-weight: 600; font-size: 13px; letter-spacing: 0.5px; margin-bottom: 0;">
                  注文書連携
                  <label style="display: inline-flex; align-items: center; gap: 4px; font-weight: 500; font-size: 12.5px; color: #5F6368; cursor: pointer; margin-left: auto;">
                    <input type="checkbox" id="input-no-order" style="cursor: pointer; accent-color: #5F6368;">
                    注文書なし
                  </label>
                </label>
              </div>
              <div class="form-group" id="group-linked-project">
                <label class="form-label" for="input-linked-project">対象工事</label>
                <select id="input-linked-project" class="form-select">
                  <option value="">-- 選択してください --</option>
                </select>
              </div>
              <div class="form-group" id="group-order-number">
                <label class="form-label" for="input-order-number">注文書番号</label>
                <div class="autocomplete-wrapper">
                  <input type="text" id="input-order-number" class="form-input" placeholder="対象工事を選択すると候補が表示されます" autocomplete="off">
                  <div id="order-suggestions" class="autocomplete-list hidden"></div>
                </div>
              </div>
              <!-- 基本情報 -->
              <div class="form-group">
                <label class="form-label" for="input-category">取引区分 <span style="color:#DC2626">*</span></label>
                <select id="input-category" class="form-select" required>
                  <option value="outsource">外注</option>
                  <option value="material">資機材</option>
                  <option value="expense">経費</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-company">会社名 <span style="color:#DC2626">*</span></label>
                <div class="autocomplete-wrapper">
                  <input type="text" id="input-company" class="form-input" placeholder="会社名を入力" autocomplete="off" required>
                  <div id="company-suggestions" class="autocomplete-list hidden"></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-site">現場名（正式名称） <span style="color:#DC2626">*</span></label>
                <div class="autocomplete-wrapper">
                  <input type="text" id="input-site" class="form-input" placeholder="現場名を入力" autocomplete="off" required>
                  <div id="site-suggestions" class="autocomplete-list hidden"></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-site-short">省略名称（一覧用） <span style="color:#DC2626">*</span></label>
                <input type="text" id="input-site-short" class="form-input" placeholder="一覧表示用の短い名称" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-date">請求書年月日 <span style="color:#DC2626">*</span></label>
                <input type="date" id="input-date" class="form-input" required>
              </div>
              <div class="form-group" id="group-work-type">
                <label class="form-label" for="input-work-type">工事内容 <span style="color:#DC2626">*</span></label>
                <div class="autocomplete-wrapper">
                  <input type="text" id="input-work-type" class="form-input" placeholder="工事内容を入力" autocomplete="off" required>
                  <div id="work-suggestions" class="autocomplete-list hidden"></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-amount">金額（税込） <span style="color:#DC2626">*</span></label>
                <input type="text" id="input-amount" class="form-input" placeholder="例: 1,000,000" required>
                <div id="order-ref-info" class="hidden" style="display:none; margin-top: 6px; font-size: 12.5px; color: #5F6368; line-height: 1.5;">
                  <span style="white-space: nowrap;">発注金額：<strong id="order-ref-amount" style="color: #1A73E8; font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums;">¥0</strong></span>
                  <span style="margin: 0 6px; color: #DADCE0;">|</span>
                  <span style="white-space: nowrap;">支払実績：<strong id="order-ref-paid" style="font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums;">¥0</strong><span id="order-ref-percent" style="font-weight: 600; margin-left: 2px;">（0%）</span></span>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-payment-month">支払月 <span style="color:#DC2626">*</span></label>
                <input type="month" id="input-payment-month" class="form-input" required>
              </div>
              <div class="form-group full-width">
                <label class="form-label" for="input-notes">備考</label>
                <input type="text" id="input-notes" class="form-input" placeholder="特記事項やメモなどがあれば入力">
              </div>
            </div>
            <div id="invoice-duplicate-alert" class="alert alert-warning hidden mt-4" style="margin-bottom: 0; width: 100%;"></div>
            <div class="btn-group mt-4" style="display: flex; align-items: center; justify-content: flex-end; gap: 12px; flex-wrap: wrap;">
              <span id="invoice-edit-status" class="hidden" style="color: var(--google-primary); font-weight: 600; font-size: 14px; margin-right: auto; display: inline-flex; align-items: center; gap: 6px;">
                <span class="material-symbols-outlined" style="font-size: 18px;">info</span> 請求データを編集中です
              </span>
              <button type="button" id="btn-cancel-edit" class="btn btn-secondary hidden">
                <span class="material-symbols-outlined btn-icon">close</span>編集キャンセル
              </button>
              <button type="button" id="btn-clear-form" class="btn btn-secondary">
                <span class="material-symbols-outlined btn-icon">restart_alt</span>クリア
              </button>
              <button type="submit" id="btn-submit-invoice" class="btn btn-primary">
                <span class="material-symbols-outlined btn-icon">save</span>登録
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- === 請求一覧セクション === -->
      <section id="tab-list" class="tab-content">
        <div class="card">
          <div class="flex-between">
            <h2 class="section-title" style="margin-bottom:0">請求一覧</h2>
            <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
              <div class="month-selector" style="margin-bottom:0">
                <button id="btn-list-prev" class="month-nav-btn">◀</button>
                <span id="list-month-display" class="month-display"></span>
                <button id="btn-list-next" class="month-nav-btn">▶</button>
              </div>
              <div class="btn-group" style="margin-top: 0;">
                <button id="btn-export-list-pdf" class="btn btn-secondary btn-sm">
                  <span class="material-symbols-outlined btn-icon" style="font-size: 16px;">picture_as_pdf</span>PDF出力 (A3横)
                </button>
                <button id="btn-export-list-csv" class="btn btn-secondary btn-sm">
                  <span class="material-symbols-outlined btn-icon" style="font-size: 16px;">download</span>CSV出力
                </button>
              </div>
            </div>
          </div>
          <p id="list-title" class="section-subtitle"></p>
        </div>
        <div class="card" style="padding: 0; overflow: hidden;">
          <div class="cross-table-container">
            <table id="cross-table" class="cross-table">
              <thead id="cross-table-head"></thead>
              <tbody id="cross-table-body"></tbody>
            </table>
          </div>
          <div id="list-empty" class="hidden" style="padding: 40px; text-align: center; color: #64748B;">この月の請求データはありません</div>
        </div>
      </section>

      <!-- === 支払通知発行セクション === -->
      <section id="tab-notice" class="tab-content">
        <div class="card">
          <h2 class="section-title">支払通知発行</h2>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="notice-month">支払月</label>
              <input type="month" id="notice-month" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="notice-search">業者名で検索</label>
              <input type="text" id="notice-search" class="form-input" placeholder="会社名またはフリガナで検索...">
            </div>
          </div>
        </div>

        <!-- 支払い対象業者一覧テーブル -->
        <div class="card">
          <h3 class="section-subtitle" id="notice-list-title">支払い対象業者一覧</h3>
          <div class="cross-table-container" id="notice-company-list-container" style="overflow-y: auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 120px;">ステータス</th>
                  <th>会社名</th>
                  <th class="amount" style="width: 160px;">支払額合計</th>
                  <th class="text-center" style="width: 80px;">件数</th>
                  <th class="text-center" style="width: 200px;">操作</th>
                </tr>
              </thead>
              <tbody id="notice-company-list">
                <!-- JSで動的に追加されます -->
              </tbody>
            </table>
          </div>
          <div id="notice-empty" class="hidden" style="padding: 40px; text-align: center; color: #64748B;">この月の支払い対象業者はありません</div>
        </div>

        <!-- プレビュー表示 -->
        <div id="notice-preview-container" class="hidden">
          <div class="card">
            <div class="flex-between mb-4" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <h3 class="section-subtitle" style="margin-bottom: 0;">支払通知書プレビュー</h3>
              <button id="btn-generate-pdf" class="btn btn-primary">
                <span class="material-symbols-outlined btn-icon">picture_as_pdf</span>PDF出力
              </button>
            </div>
            <div id="notice-preview" class="notice-preview">
              <!-- PDF content will be generated here -->
            </div>
          </div>
        </div>
      </section>

      <!-- === 設定セクション === -->
      <section id="tab-settings" class="tab-content">
        <div class="card">
          <h2 class="section-title">自社情報</h2>
          <form id="settings-form">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="settings-company-name">会社名</label>
                <input type="text" id="settings-company-name" class="form-input">
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-postal-code">郵便番号</label>
                <input type="text" id="settings-postal-code" class="form-input" placeholder="〒000-0000">
              </div>
              <div class="form-group full-width">
                <label class="form-label" for="settings-address">住所</label>
                <input type="text" id="settings-address" class="form-input">
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-tel">電話番号</label>
                <input type="text" id="settings-tel" class="form-input">
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-fax">FAX番号</label>
                <input type="text" id="settings-fax" class="form-input">
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-invoice-number">インボイス登録番号</label>
                <input type="text" id="settings-invoice-number" class="form-input" placeholder="T0000000000000">
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-tax-rate">消費税率（%）</label>
                <input type="number" id="settings-tax-rate" class="form-input" value="10" min="0" max="100">
              </div>
            </div>
            <div class="btn-group mt-4">
              <button type="submit" class="btn btn-primary">
                <span class="material-symbols-outlined btn-icon">save</span>保存
              </button>
            </div>
          </form>
        </div>
        <div class="card">
          <div class="flex-between">
            <h2 class="section-title" style="margin-bottom:0">会社マスター</h2>
            <button id="btn-add-company" class="btn btn-primary btn-sm">
              <span class="material-symbols-outlined btn-icon" style="font-size: 16px;">add</span>新規追加
            </button>
          </div>
          <div style="margin-top: 12px;">
            <div style="position: relative;">
              <span class="material-symbols-outlined" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #9AA0A6;">search</span>
              <input type="text" id="company-master-search" class="form-input" placeholder="会社名・フリガナ・業種・担当者で検索..." style="padding-left: 40px;" autocomplete="off">
            </div>
          </div>
          <div id="company-master-list" class="mt-4"></div>
        </div>
        <div class="card">
          <h2 class="section-title">データ管理</h2>
          <div class="btn-group" style="justify-content: flex-start;">
            <button id="btn-export-json" class="btn btn-secondary">
              <span class="material-symbols-outlined btn-icon">download</span>エクスポート (JSON)
            </button>
            <button id="btn-import-json" class="btn btn-secondary">
              <span class="material-symbols-outlined btn-icon">upload</span>インポート (JSON)
            </button>
            <input type="file" id="import-file-input" accept=".json" class="hidden">
          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<!-- 会社登録/編集モーダル -->
<div id="company-modal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="btn-close-company-modal">✕</button>
    <h3 class="modal-title" id="company-modal-title">会社情報登録</h3>
    <form id="company-form">
      <div class="form-grid">
        <div class="form-group full-width">
          <label class="form-label" for="company-name">会社名 <span style="color:#DC2626">*</span></label>
          <input type="text" id="company-name" class="form-input" required>
        </div>
        <div class="form-group full-width">
          <label class="form-label" for="company-kana">フリガナ（あいうえお順用） <span style="color:#DC2626">*</span></label>
          <input type="text" id="company-kana" class="form-input" placeholder="例: アイスコンフォート" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="company-contact-person">担当者</label>
          <input type="text" id="company-contact-person" class="form-input" placeholder="担当者名を入力">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-email">メールアドレス</label>
          <input type="email" id="company-email" class="form-input" placeholder="example@domain.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-industry">業種</label>
          <select id="company-industry" class="form-select">
            <option value="">選択してください</option>
            <option value="外注">外注</option>
            <option value="資材">資材</option>
            <option value="機器">機器</option>
            <option value="経費">経費</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="company-postal">郵便番号</label>
          <input type="text" id="company-postal" class="form-input" placeholder="〒000-0000">
        </div>
        <div class="form-group full-width">
          <label class="form-label" for="company-address">住所</label>
          <input type="text" id="company-address" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-tel">電話番号</label>
          <input type="text" id="company-tel" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-fax">FAX番号</label>
          <input type="text" id="company-fax" class="form-input">
        </div>
        <div class="form-group full-width">
          <label class="form-label" for="company-invoice-num">インボイス登録番号</label>
          <input type="text" id="company-invoice-num" class="form-input" placeholder="T0000000000000">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-bank">銀行名</label>
          <input type="text" id="company-bank" class="form-input" placeholder="例: みずほ銀行">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-branch">支店名</label>
          <input type="text" id="company-branch" class="form-input" placeholder="例: 渋谷支店">
        </div>
        <div class="form-group">
          <label class="form-label" for="company-account-type">口座種別</label>
          <select id="company-account-type" class="form-select">
            <option value="普通">普通</option>
            <option value="当座">当座</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="company-account-num">口座番号</label>
          <input type="text" id="company-account-num" class="form-input">
        </div>
      </div>
      <div class="btn-group mt-4">
        <button type="button" id="btn-cancel-company" class="btn btn-secondary">
          <span class="material-symbols-outlined btn-icon">close</span>キャンセル
        </button>
        <button type="submit" class="btn btn-primary">
          <span class="material-symbols-outlined btn-icon">check</span>登録
        </button>
      </div>
    </form>
  </div>
</div>

<!-- 請求詳細/編集モーダル -->
<div id="invoice-modal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="btn-close-invoice-modal">✕</button>
    <h3 class="modal-title">請求詳細</h3>
    <div id="invoice-modal-content"></div>
  </div>
</div>

<!-- トースト通知 -->
<div id="toast-container" style="position:fixed;top:20px;right:20px;z-index:2000;"></div>

<script src="app.js?v=20260618f" defer></script>
</body>
</html>
